<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Bộ sưu tập tranh vẽ</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style6.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

    <div class="container mt-5">

        <!-- Tiêu đề -->
        <h1 class="text-center mb-5 text-danger">
            🎨 Bộ Sưu Tập Tranh Vẽ
        </h1>

        <!-- Danh sách tranh -->
        <div 
            class="product-list row row-cols-1 row-cols-md-3 g-4"
            id="product-list">
        </div>

    </div>

<script>

    // Danh sách tranh
    const paintingList = [

        {
            id: "01",
            name: "Mona Lisa",
            artist: "Leonardo da Vinci",
            image: "assets/image/monalisa.jpg"
        },

        {
            id: "02",
            name: "Starry Night",
            artist: "Vincent van Gogh",
            image: "assets/image/starrynight.jpg"
        },

        {
            id: "03",
            name: "The Scream",
            artist: "Edvard Munch",
            image: "assets/image/thescream.jpg"
        },

        {
            id: "04",
            name: "Girl with a Pearl Earring",
            artist: "Johannes Vermeer",
            image: "assets/image/girlpearl.jpg"
        },

        {
            id: "05",
            name: "Modern Art", 
            artist: "Digital Art",
            image: "assets/image/lastsupper.jpg"
        },

        {
            id: "06",
            name: "The Last Supper",
            artist: "Creative Studio",
            image: "assets/image/sunflowers.jpg"
        }

    ];

    // Hàm thêm tranh
    function addPainting(id, name, artist, image)
    {

        // Cột Bootstrap
        const productItem = document.createElement("div");
        productItem.setAttribute("class", "col");

        // Card
        const card = document.createElement("div");
        card.setAttribute("class", "card h-100 shadow");

        // Ảnh
        const myImage = document.createElement("img");

        myImage.setAttribute("src", image);
        myImage.setAttribute("alt", name);
        myImage.setAttribute("class", "card-img-top");

        // Nội dung card
        const cardBody = document.createElement("div");
        cardBody.setAttribute("class", "card-body text-center");

        // Tên tranh
        const paintingName = document.createElement("h5");

        paintingName.setAttribute("class", "card-title");

        paintingName.textContent = name;

        // Họa sĩ
        const artistName = document.createElement("p");

        artistName.setAttribute("class", "card-text");

        artistName.textContent = "Họa sĩ: " + artist;

        // Nút chi tiết
        const detailButton = document.createElement("a");

        detailButton.textContent = "Xem chi tiết";

        detailButton.setAttribute(
            "href",
            "painting-detail.html?id=" + id
        );

        detailButton.setAttribute(
            "class",
            "btn btn-primary"
        );

        // Gắn vào card body
        cardBody.appendChild(paintingName);
        cardBody.appendChild(artistName);
        cardBody.appendChild(detailButton);

        // Gắn ảnh + body vào card
        card.appendChild(myImage);
        card.appendChild(cardBody);

        // Gắn card vào cột
        productItem.appendChild(card);

        // Hiển thị ra màn hình
        document
            .getElementById("product-list")
            .appendChild(productItem);
    }

    // Hiển thị tất cả tranh
    paintingList.forEach(function(item){

        addPainting(
            item.id,
            item.name,
            item.artist,
            item.image
        );

    });

</script>

</body>
</html>
