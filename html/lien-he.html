<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Liên hệ - Triển Lãm Tranh</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<nav class="d-flex justify-content-center gap-3 p-3 bg-light shadow-sm">

    <a href="../index.html" class="btn btn-outline-success">Trang chủ</a>
    <a href="san-pham.html" class="btn btn-outline-success">Tranh triển lãm</a>
    <a href="gioi-thieu.html" class="btn btn-outline-success">Giới thiệu</a>
    <a href="lien-he.html" class="btn btn-success">Liên hệ</a>

</nav>

<div class="container mt-5">

    <h1 class="text-center text-success mb-4">
        📞 Liên Hệ Triển Lãm Tranh
    </h1>

    <div class="row">

        <!-- Thông tin -->
        <div class="col-md-6 mb-4">

            <h4>Thông tin triển lãm</h4>

            <p>🎨 Triển lãm tranh nghệ thuật quốc tế</p>
            <p>📍 Địa điểm: 111 Đường Nghệ Thuật, TP.VL</p>
            <p>📞 Hotline: 0339908007</p>
            <p>📧 Email: gallery.art@gmail.com</p>

            <hr>

            <h5>Thời gian mở cửa</h5>
            <p>Thứ 2 - Chủ nhật: 8h00 - 20h00</p>

        </div>

        <!-- Form -->
        <div class="col-md-6">

            <h4>Gửi yêu cầu tham quan</h4>

            <form onsubmit="sendContact(event)">

                <div class="mb-3">
                    <input type="text" class="form-control" placeholder="Họ và tên" required>
                </div>

                <div class="mb-3">
                    <input type="email" class="form-control" placeholder="Email" required>
                </div>

                <div class="mb-3">
                    <textarea class="form-control" rows="4" placeholder="Bạn muốn hỏi về tác phẩm / vé tham quan..." required></textarea>
                </div>

                <button type="submit" class="btn btn-success w-100">
                    Gửi yêu cầu
                </button>

            </form>

        </div>

    </div>

</div>

<script src="../js/script.js"></script>

<script>
function sendContact(event) {
    event.preventDefault();
    alert("🎨 Gửi yêu cầu thành công! Chúng tôi sẽ phản hồi sớm nhất.");
}
</script>

</body>
</html>
